<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Dia Zone - Admin Panel</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', 'Poppins', sans-serif; 
      min-height: 100vh; 
      background-image: url('image/layla.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      padding-bottom: 2rem;
    }
    .admin-container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
    .admin-header { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(12px); padding: 1rem 1.5rem; border-radius: 1rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border: 1px solid rgba(255, 215, 0, 0.2); }
    .logo h1 { background: linear-gradient(120deg, #FFF8E7, #FFE6A3); -webkit-background-clip: text; background-clip: text; color: transparent; font-size: 1.5rem; }
    .logo span { color: #9ba3e0; font-size: 0.8rem; }
    .admin-info { display: flex; align-items: center; gap: 1rem; color: #fff; }
    .logout-btn { background: rgba(255, 70, 70, 0.15); border: 1px solid rgba(255, 110, 110, 0.4); color: #ffaeae; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: 600; }
    .logout-btn:hover { background: rgba(255, 80, 80, 0.3); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(8px); border-radius: 1rem; padding: 1.2rem; border: 1px solid rgba(255, 215, 0, 0.2); cursor: pointer; transition: all 0.2s; }
    .stat-card:hover { transform: translateY(-3px); background: rgba(51, 65, 85, 0.9); }
    .stat-card i { font-size: 2rem; color: #FFC857; margin-bottom: 0.5rem; }
    .stat-card h3 { color: #9ba3e0; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .stat-card .number { font-size: 2rem; font-weight: 700; color: #FFE6A3; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab-btn { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255, 215, 0, 0.2); padding: 0.7rem 1.5rem; border-radius: 2rem; color: #a3abdf; cursor: pointer; font-weight: 600; }
    .tab-btn.active { background: linear-gradient(95deg, #FFC857, #FFAE2B); color: #12142e; border: none; }
    .tab-content { display: none; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(8px); border-radius: 1rem; padding: 1.5rem; border: 1px solid rgba(255, 215, 0, 0.2); }
    .tab-content.active { display: block; }
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.8rem; text-align: left; border-bottom: 1px solid rgba(255, 215, 0, 0.1); color: #e2e8f0; }
    th { color: #FFC857; }
    .status-pending { background: #f59e0b; color: #12142e; padding: 0.2rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; display: inline-block; }
    .status-completed { background: #10b981; color: white; padding: 0.2rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; display: inline-block; }
    .status-approved { background: #10b981; color: white; padding: 0.2rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; display: inline-block; }
    .status-verified { background: #10b981; color: white; padding: 0.2rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; display: inline-block; }
    .status-suspended { background: #ef4444; color: white; padding: 0.2rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; display: inline-block; }
    .approve-btn { background: #10b981; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; color: white; cursor: pointer; margin-right: 0.5rem; }
    .reject-btn { background: #ef4444; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; color: white; cursor: pointer; }
    .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1rem; }
    .user-card { background: rgba(15, 23, 42, 0.9); border-radius: 1rem; padding: 1rem; border: 1px solid rgba(255, 215, 0, 0.2); }
    .user-card h4 { color: #FFE6A3; margin-bottom: 0.5rem; }
    .user-card p { color: #9ba3e0; font-size: 0.8rem; margin: 0.3rem 0; }
    .user-actions { display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap; }
    .btn-add-balance { background: #10b981; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; color: white; cursor: pointer; }
    .btn-remove-balance { background: #ef4444; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; color: white; cursor: pointer; }
    .btn-ban { background: #f59e0b; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; color: white; cursor: pointer; }
    .btn-unban { background: #3b82f6; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; color: white; cursor: pointer; }
    .btn-delete { background: #dc2626; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; color: white; cursor: pointer; }
    .btn-message { background: #8b5cf6; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; color: white; cursor: pointer; }
    .games-list { margin-bottom: 1rem; }
    .game-item { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem; border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
    .game-name { color: #FFE6A3; font-weight: 500; }
    .edit-price-btn { background: #3b82f6; border: none; padding: 0.3rem 0.8rem; border-radius: 0.5rem; color: white; cursor: pointer; }
    .request-card { background: rgba(15, 23, 42, 0.9); border-radius: 1rem; padding: 1rem; border: 1px solid rgba(255, 215, 0, 0.2); margin-bottom: 1rem; }
    .request-card h4 { color: #FFE6A3; margin-bottom: 0.5rem; }
    .messages-list { display: flex; flex-direction: column; gap: 1rem; max-height: 500px; overflow-y: auto; }
    .message-card { background: rgba(15, 23, 42, 0.9); border-radius: 1rem; padding: 1rem; border: 1px solid rgba(255, 215, 0, 0.2); }
    .reply-area { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
    .reply-area input { flex: 1; padding: 0.6rem 1rem; border-radius: 2rem; border: 1px solid rgba(255, 215, 0, 0.3); background: rgba(10, 12, 28, 0.7); color: white; }
    .reply-area button { background: linear-gradient(95deg, #FFC857, #FFAE2B); border: none; padding: 0.6rem 1.2rem; border-radius: 2rem; color: #12142e; cursor: pointer; font-weight: 600; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
    .modal.show { display: flex; }
    .modal-content { background: #1a1e3a; border-radius: 1rem; padding: 1.5rem; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; color: white; border: 1px solid rgba(255, 215, 0, 0.3); }
    .modal-content input { width: 100%; padding: 0.8rem; margin: 1rem 0; background: #0f122e; border: 1px solid rgba(255, 215, 0, 0.3); color: white; border-radius: 0.5rem; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 1rem; }
    .modal-buttons button { flex: 1; padding: 0.8rem; border-radius: 0.5rem; border: none; cursor: pointer; font-weight: 600; }
    .save-btn { background: linear-gradient(95deg, #FFC857, #FFAE2B); color: #12142e; }
    .cancel-btn { background: rgba(255, 255, 255, 0.1); color: #b9c3ff; }
    .badge { background: #ef4444; color: white; border-radius: 50%; padding: 0.2rem 0.5rem; font-size: 0.7rem; margin-left: 0.5rem; }
    .empty-state { text-align: center; color: #9ba3e0; padding: 2rem; }
    .price-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem; border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
    .price-item input { width: 140px; margin: 0; }
    .user-name { color: #FFC857; font-weight: 600; }
    h4 { color: #FFE6A3; margin: 0.8rem 0 0.5rem 0; }
  </style>
</head>
<body>

<div class="admin-container">
  <div class="admin-header">
    <div class="logo"><h1>Dia Zone <span>Admin Panel</span></h1></div>
    <div class="admin-info"><span><i class="fas fa-user-shield"></i> Admin</span><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> ထွက်မည်</button></div>
  </div>

  <div class="stats-grid">
    <div class="stat-card" data-tab="users"><i class="fas fa-users"></i><h3>အသုံးပြုသူစုစုပေါင်း</h3><div class="number" id="totalUsers">0</div></div>
    <div class="stat-card" data-tab="games"><i class="fas fa-gamepad"></i><h3>ဂိမ်းစုစုပေါင်း</h3><div class="number" id="totalGames">0</div></div>
    <div class="stat-card" data-tab="orders"><i class="fas fa-shopping-bag"></i><h3>ဆိုင်းငံ့ထားသော အော်ဒါများ</h3><div class="number" id="pendingOrders">0</div></div>
    <div class="stat-card" data-tab="topups"><i class="fas fa-plus-circle"></i><h3>ဆိုင်းငံ့ထားသော ငွေဖြည့်မှုများ</h3><div class="number" id="pendingTopups">0</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="orders">📦 အော်ဒါများ <span id="orderBadge" class="badge">0</span></button>
    <button class="tab-btn" data-tab="topups">💰 ငွေဖြည့်မှုများ <span id="topupBadge" class="badge">0</span></button>
    <button class="tab-btn" data-tab="users">👥 အသုံးပြုသူများ</button>
    <button class="tab-btn" data-tab="games">🎮 ဂိမ်းများ</button>
    <button class="tab-btn" data-tab="messages">💬 စာတိုများ</button>
  </div>

  <div id="ordersTab" class="tab-content active"><div class="table-wrapper"><table><thead><tr><th>အသုံးပြုသူ</th><th>ပစ္စည်း</th><th>ပမာဏ</th><th>Game ID</th><th>Server</th><th>ရက်စွဲ</th><th>အခြေအနေ</th><th>လုပ်ဆောင်ချက်</th></tr></thead><tbody id="ordersList"></tbody></table></div></div>
  <div id="topupsTab" class="tab-content"><div id="topupRequestsList"></div></div>
  <div id="usersTab" class="tab-content"><div class="users-grid" id="usersGrid"></div></div>
  <div id="gamesTab" class="tab-content"><div class="games-list" id="gamesList"></div></div>
  <div id="messagesTab" class="tab-content"><div class="messages-list" id="messagesList"></div></div>
</div>

<!-- Balance Modal -->
<div id="balanceModal" class="modal">
  <div class="modal-content"><h3 id="modalTitle">ငွေထည့်ရန်</h3><input type="number" id="amountInput" placeholder="ပမာဏထည့်ပါ (Ks)"><div class="modal-buttons"><button class="cancel-btn" id="closeBalanceModal">မလုပ်တော့ပါ</button><button class="save-btn" id="confirmBalanceBtn">အတည်ပြုမည်</button></div></div>
</div>

<!-- Price Modal with Save & Cancel Buttons -->
<div id="priceModal" class="modal">
  <div class="modal-content">
    <h3 id="priceModalTitle">ဈေးနှုန်းများ ပြင်ရန်</h3>
    <div id="priceListContainer" style="max-height: 400px; overflow-y: auto;"></div>
    <div class="modal-buttons">
      <button class="cancel-btn" id="closePriceModal">မလုပ်တော့ပါ (Cancel)</button>
      <button class="save-btn" id="savePriceBtn">သိမ်းမည် (Save)</button>
    </div>
  </div>
</div>

<!-- Message User Modal -->
<div id="messageUserModal" class="modal">
  <div class="modal-content"><h3><i class="fas fa-paper-plane"></i> အသုံးပြုသူထံ စာပို့ရန်</h3><input type="text" id="adminMessageInput" placeholder="စာသားရိုက်ထည့်ပါ..."><div class="modal-buttons"><button class="cancel-btn" id="closeMessageModal">မလုပ်တော့ပါ</button><button class="save-btn" id="sendMessageBtn">ပို့မည်</button></div></div>
</div>

<script>
  // Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyCZridqu0bhTRM5mzbRdfJxWic4xcG7rg4",
    authDomain: "dia-zone.firebaseapp.com",
    databaseURL: "https://dia-zone-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dia-zone",
    storageBucket: "dia-zone.firebasestorage.app",
    messagingSenderId: "954378673786",
    appId: "1:954378673786:web:fe6ab648f60eb5207665c3"
  };

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Admin Auth Check
  function checkAdminAuth() {
    const adminData = sessionStorage.getItem('adminLoggedIn');
    if (!adminData) { window.location.href = 'admin-login.html'; return false; }
    try {
      const data = JSON.parse(adminData);
      if (!data.loggedIn || Date.now() > new Date(data.expiryTime)) {
        sessionStorage.removeItem('adminLoggedIn');
        window.location.href = 'admin-login.html';
        return false;
      }
      return true;
    } catch(e) { window.location.href = 'admin-login.html'; return false; }
  }
  if (!checkAdminAuth()) {}

  let allOrders = [], allTopups = [], allUsers = [], allGames = [], allMessages = [];
  let currentPriceGame = null;
  let mlPrices = null, pubgPrices = null;
  let currentUserId = null, currentBalanceMode = null;
  let currentMessageUserId = null;

  function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
  function formatNumber(num) { return (num || 0).toLocaleString(); }
  function formatDate(dateString) { if (!dateString) return 'N/A'; try { return new Date(dateString).toLocaleString(); } catch(e) { return dateString; } }

  // Load Orders
  function loadOrders() {
    db.ref('orders').on('value', (snapshot) => {
      allOrders = [];
      snapshot.forEach(child => { const order = child.val(); order.id = child.key; allOrders.push(order); });
      renderOrders(); updateStats();
    });
  }

  function renderOrders() {
    const tbody = document.getElementById('ordersList');
    if (!tbody) return;
    if (allOrders.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">အော်ဒါမရှိသေးပါ</td><\/tr>'; return; }
    tbody.innerHTML = '';
    [...allOrders].reverse().forEach(order => {
      const statusClass = order.status === 'Pending' ? 'status-pending' : (order.status === 'Completed' ? 'status-completed' : 'status-pending');
      const row = document.createElement('tr');
      row.innerHTML = `<td>${escapeHtml(order.userName)}</td><td>${escapeHtml(order.product)}</td><td>${formatNumber(order.amount)} Ks</td><td>${escapeHtml(order.gameId || 'N/A')}</td><td>${escapeHtml(order.serverId || 'N/A')}</td><td>${formatDate(order.orderDateDisplay)}</td><td><span class="${statusClass}">${order.status || 'Pending'}</span></td><td>${order.status === 'Pending' ? `<button class="approve-btn" data-id="${order.id}" data-amount="${order.amount}" data-userid="${order.userId}">အတည်ပြုမည်</button><button class="reject-btn" data-id="${order.id}">ပယ်ချမည်</button>` : 'ပြီးဆုံးပြီ'}</td>`;
      tbody.appendChild(row);
    });
    document.querySelectorAll('.approve-btn').forEach(btn => btn.addEventListener('click', () => approveOrder(btn.dataset.id, btn.dataset.amount, btn.dataset.userid)));
    document.querySelectorAll('.reject-btn').forEach(btn => btn.addEventListener('click', () => rejectOrder(btn.dataset.id)));
  }

  async function approveOrder(orderId, amount, userId) {
    await db.ref('orders/' + orderId).update({ status: 'Completed' });
    const userSnap = await db.ref('users/' + userId).once('value');
    const currentBalance = userSnap.val()?.balance || 0;
    await db.ref('users/' + userId).update({ balance: currentBalance + parseInt(amount) });
    renderOrders(); renderUsers(); updateStats();
    alert('အော်ဒါအတည်ပြုပြီးပါပြီ။');
  }

  async function rejectOrder(orderId) {
    await db.ref('orders/' + orderId).update({ status: 'Rejected' });
    renderOrders(); updateStats();
    alert('အော်ဒါအား ပယ်ချလိုက်ပါသည်။ (ငွေမဖြတ်ပါ)');
  }

  // Load Topups
  function loadTopups() {
    db.ref('topups').on('value', (snapshot) => {
      allTopups = [];
      snapshot.forEach(child => { const topup = child.val(); topup.id = child.key; allTopups.push(topup); });
      renderTopups(); updateStats();
    });
  }

  function renderTopups() {
    const container = document.getElementById('topupRequestsList');
    if (!container) return;
    const pendingTopups = allTopups.filter(t => t.status === 'Pending');
    if (pendingTopups.length === 0) { container.innerHTML = '<div class="empty-state">ဆိုင်းငံ့ထားသော ငွေဖြည့်မှုမရှိပါ</div>'; return; }
    container.innerHTML = '';
    pendingTopups.forEach(topup => {
      const card = document.createElement('div'); card.className = 'request-card';
      card.innerHTML = `<h4><i class="fas fa-coins"></i> ${formatNumber(topup.amount)} Ks ငွေဖြည့်ရန် တောင်းဆိုမှု</h4><p><i class="fas fa-user"></i> အသုံးပြုသူ: ${escapeHtml(topup.userName)}</p><p><i class="fas fa-phone"></i> ဖုန်း: ${escapeHtml(topup.userPhone)}</p><p><i class="fas fa-receipt"></i> ပြေစာ: ${escapeHtml(topup.receiptId)}</p><p><i class="far fa-calendar"></i> ရက်စွဲ: ${formatDate(topup.requestDateDisplay)}</p><div class="user-actions"><button class="approve-topup" data-id="${topup.id}" data-amount="${topup.amount}" data-userid="${topup.userId}">အတည်ပြုမည်</button><button class="reject-topup" data-id="${topup.id}">ပယ်ချမည်</button></div>`;
      container.appendChild(card);
    });
    document.querySelectorAll('.approve-topup').forEach(btn => btn.addEventListener('click', async () => {
      const id = btn.dataset.id, amount = parseInt(btn.dataset.amount), userId = btn.dataset.userid;
      await db.ref('topups/' + id).update({ status: 'Approved' });
      const userSnap = await db.ref('users/' + userId).once('value');
      const currentBalance = userSnap.val()?.balance || 0;
      await db.ref('users/' + userId).update({ balance: currentBalance + amount });
      renderTopups(); renderUsers(); updateStats();
      alert(`${amount.toLocaleString()} Ks ထည့်သွင်းပြီးပါပြီ။`);
    }));
    document.querySelectorAll('.reject-topup').forEach(btn => btn.addEventListener('click', async () => {
      await db.ref('topups/' + btn.dataset.id).update({ status: 'Rejected' });
      renderTopups(); updateStats();
      alert('ငွေဖြည့်တောင်းဆိုမှုအား ပယ်ချလိုက်ပါသည်။');
    }));
  }
    // Load Users
  function loadUsers() {
    db.ref('users').on('value', (snapshot) => {
      allUsers = [];
      snapshot.forEach(child => { const user = child.val(); user.id = child.key; allUsers.push(user); });
      renderUsers(); updateStats();
    });
  }

  function renderUsers() {
    const grid = document.getElementById('usersGrid');
    if (!grid) return;
    if (allUsers.length === 0) { grid.innerHTML = '<div class="empty-state">အသုံးပြုသူမရှိပါ</div>'; return; }
    grid.innerHTML = '';
    allUsers.forEach(user => {
      const isSuspended = user.status === 'Suspended';
      const card = document.createElement('div'); card.className = 'user-card';
      card.innerHTML = `<h4><i class="fas fa-user-circle"></i> ${escapeHtml(user.name)}</h4><p><i class="fas fa-phone"></i> ${escapeHtml(user.phone)}</p><p><i class="fas fa-envelope"></i> ${escapeHtml(user.email)}</p><p><i class="fas fa-coins"></i> လက်ကျန်: ${formatNumber(user.balance)} Ks</p><p>အခြေအနေ: <span class="${isSuspended ? 'status-suspended' : 'status-verified'}">${user.status || 'Verified'}</span></p><div class="user-actions"><button class="btn-add-balance" data-id="${user.id}">ငွေထည့်မည်</button><button class="btn-remove-balance" data-id="${user.id}">ငွေဖြတ်မည်</button><button class="btn-message" data-id="${user.id}" data-name="${escapeHtml(user.name)}">စာပို့မည်</button>${isSuspended ? `<button class="btn-unban" data-id="${user.id}">Ban ဖြုတ်မည်</button>` : `<button class="btn-ban" data-id="${user.id}">Ban လုပ်မည်</button>`}<button class="btn-delete" data-id="${user.id}" data-name="${escapeHtml(user.name)}">ဖျက်မည်</button></div>`;
      grid.appendChild(card);
    });
    document.querySelectorAll('.btn-add-balance').forEach(btn => btn.addEventListener('click', () => openBalanceModal(btn.dataset.id, 'add')));
    document.querySelectorAll('.btn-remove-balance').forEach(btn => btn.addEventListener('click', () => openBalanceModal(btn.dataset.id, 'remove')));
    document.querySelectorAll('.btn-ban').forEach(btn => btn.addEventListener('click', () => db.ref('users/' + btn.dataset.id).update({ status: 'Suspended' })));
    document.querySelectorAll('.btn-unban').forEach(btn => btn.addEventListener('click', () => db.ref('users/' + btn.dataset.id).update({ status: 'Verified' })));
    document.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', async () => {
      if (confirm(`${btn.dataset.name} ကို ဖျက်ပါမည်လား? ဖျက်လိုက်ပါက ပြန်လည် register လုပ်ရမည်။`)) {
        await db.ref('users/' + btn.dataset.id).remove();
        renderUsers(); updateStats();
        alert('အသုံးပြုသူအား ဖျက်ပြီးပါပြီ။');
      }
    }));
    document.querySelectorAll('.btn-message').forEach(btn => btn.addEventListener('click', () => openMessageModal(btn.dataset.id, btn.dataset.name)));
  }

  function openBalanceModal(userId, mode) {
    currentUserId = userId;
    currentBalanceMode = mode;
    document.getElementById('modalTitle').innerText = mode === 'add' ? 'ငွေထည့်ရန်' : 'ငွေဖြတ်ရန်';
    document.getElementById('amountInput').value = '';
    document.getElementById('balanceModal').classList.add('show');
  }

  async function processBalance() {
    const amount = parseInt(document.getElementById('amountInput').value);
    if (isNaN(amount) || amount <= 0) { alert('မှန်ကန်သောပမာဏထည့်ပါ'); return; }
    const userSnapshot = await db.ref('users/' + currentUserId).once('value');
    const userData = userSnapshot.val();
    if (!userData) { alert('အသုံးပြုသူမရှိပါ'); closeBalanceModal(); return; }
    let currentBalance = userData.balance || 0;
    let newBalance = currentBalanceMode === 'add' ? currentBalance + amount : currentBalance - amount;
    if (currentBalanceMode === 'remove' && currentBalance < amount) { alert(`လက်ကျန်ငွေ မလုံလောက်ပါ! လက်ကျန်: ${currentBalance.toLocaleString()} Ks`); return; }
    await db.ref('users/' + currentUserId).update({ balance: newBalance });
    alert(`ငွေ ${currentBalanceMode === 'add' ? 'ထည့်သွင်းမှု' : 'ဖြတ်တောက်မှု'} အောင်မြင်ပါသည်။\nလက်ကျန်ငွေ: ${newBalance.toLocaleString()} Ks`);
    closeBalanceModal();
    renderUsers();
    updateStats();
  }

  function openMessageModal(userId, userName) {
    currentMessageUserId = userId;
    document.getElementById('adminMessageInput').value = '';
    document.getElementById('messageUserModal').classList.add('show');
  }

  async function sendMessageToUser() {
    const message = document.getElementById('adminMessageInput').value.trim();
    if (!message) { alert('စာသားထည့်ပါ'); return; }
    await db.ref('chats/' + currentMessageUserId).push({
      text: message,
      sender: 'admin',
      timestamp: Date.now(),
      userName: 'Admin'
    });
    alert('စာပို့ပြီးပါပြီ။');
    document.getElementById('messageUserModal').classList.remove('show');
  }

  // Load Games
  function loadGames() {
    db.ref('games').on('value', (snapshot) => {
      allGames = [];
      snapshot.forEach(child => { const game = child.val(); game.id = child.key; allGames.push(game); });
      renderGames(); updateStats();
    });
  }

  function renderGames() {
    const container = document.getElementById('gamesList');
    if (!container) return;
    if (allGames.length === 0) { container.innerHTML = '<div class="empty-state">ဂိမ်းမရှိသေးပါ</div>'; return; }
    container.innerHTML = '';
    allGames.forEach(game => {
      const div = document.createElement('div'); div.className = 'game-item';
      div.innerHTML = `<span class="game-name"><i class="fas fa-gamepad"></i> ${escapeHtml(game.name)}</span><button class="edit-price-btn" data-game="${escapeHtml(game.name)}">ဈေးနှုန်းပြင်မည်</button>`;
      container.appendChild(div);
    });
    document.querySelectorAll('.edit-price-btn').forEach(btn => btn.addEventListener('click', () => openPriceModal(btn.dataset.game)));
  }

  function loadPrices() {
    db.ref('prices/mobile_legend').on('value', snap => { if (snap.exists()) mlPrices = snap.val(); });
    db.ref('prices/pubg').on('value', snap => { if (snap.exists()) pubgPrices = snap.val(); });
  }

  function openPriceModal(gameName) {
    currentPriceGame = gameName;
    const container = document.getElementById('priceListContainer');
    container.innerHTML = '';
    
    if (gameName === 'Mobile Legend' && mlPrices) {
      document.getElementById('priceModalTitle').innerHTML = `<i class="fas fa-edit"></i> ဈေးနှုန်းများပြင်ရန် - ${gameName}`;
      
      const wp = document.createElement('div'); 
      wp.className = 'price-item'; 
      wp.innerHTML = `<span><strong>အပတ်စဉ် ဖြတ်သန်းခ (Weekly Pass)</strong></span><input type="number" id="ml_weekly" value="${mlPrices.weeklyPass?.price || 6500}" step="100">`; 
      container.appendChild(wp);
      
      const frTitle = document.createElement('h4'); 
      frTitle.innerHTML = '✨ 2x Diamonds (First Recharge)'; 
      container.appendChild(frTitle);
      
      mlPrices.firstRecharge?.forEach((item, i) => { 
        const div = document.createElement('div'); 
        div.className = 'price-item'; 
        div.innerHTML = `<span>${item.diamonds} Diamonds</span><input type="number" id="ml_fr_${i}" value="${item.price}" step="100">`; 
        container.appendChild(div); 
      });
      
      const odTitle = document.createElement('h4'); 
      odTitle.innerHTML = '💎 အခြားကျောက်မျက်များ'; 
      container.appendChild(odTitle);
      
      mlPrices.otherDiamonds?.forEach((item, i) => { 
        const div = document.createElement('div'); 
        div.className = 'price-item'; 
        div.innerHTML = `<span>${item.diamonds} Diamonds</span><input type="number" id="ml_od_${i}" value="${item.price}" step="100">`; 
        container.appendChild(div); 
      });
      
      document.getElementById('priceModal').classList.add('show');
      
    } else if (gameName === 'Pubg' && pubgPrices) {
      document.getElementById('priceModalTitle').innerHTML = `<i class="fas fa-edit"></i> ဈေးနှုန်းများပြင်ရန် - ${gameName}`;
      
      const ucTitle = document.createElement('h4'); 
      ucTitle.innerHTML = '💰 UC ဖြည့်သွင်းခြင်း'; 
      container.appendChild(ucTitle);
      
      pubgPrices.uc?.forEach((item, i) => { 
        const div = document.createElement('div'); 
        div.className = 'price-item'; 
        div.innerHTML = `<span>${item.name}</span><input type="number" id="pubg_uc_${i}" value="${item.price}" step="100">`; 
        container.appendChild(div); 
      });
      
      const codeTitle = document.createElement('h4'); 
      codeTitle.innerHTML = '🎫 ကုဒ်ဈေးနှုန်း (Code Price)'; 
      container.appendChild(codeTitle);
      
      pubgPrices.code?.forEach((item, i) => { 
        const div = document.createElement('div'); 
        div.className = 'price-item'; 
        div.innerHTML = `<span>${item.name}</span><input type="number" id="pubg_code_${i}" value="${item.price}" step="100">`; 
        container.appendChild(div); 
      });
      
      document.getElementById('priceModal').classList.add('show');
      
    } else { 
      alert('ဈေးနှုန်းဒေတာ မရရှိသေးပါ။'); 
    }
  }

  function saveAllPrices() {
    if (currentPriceGame === 'Mobile Legend' && mlPrices) {
      if (document.getElementById('ml_weekly')) {
        mlPrices.weeklyPass.price = parseInt(document.getElementById('ml_weekly').value);
      }
      mlPrices.firstRecharge?.forEach((_, i) => { 
        const input = document.getElementById(`ml_fr_${i}`); 
        if (input) mlPrices.firstRecharge[i].price = parseInt(input.value); 
      });
      mlPrices.otherDiamonds?.forEach((_, i) => { 
        const input = document.getElementById(`ml_od_${i}`); 
        if (input) mlPrices.otherDiamonds[i].price = parseInt(input.value); 
      });
      db.ref('prices/mobile_legend').set(mlPrices).then(() => {
        alert('✅ Mobile Legend ဈေးနှုန်းများ သိမ်းပြီးပါပြီ။');
        document.getElementById('priceModal').classList.remove('show');
      }).catch(err => alert('သိမ်းဆည်းမှု မအောင်မြင်ပါ။ ထပ်မံကြိုးစားပါ။'));
      
    } else if (currentPriceGame === 'Pubg' && pubgPrices) {
      pubgPrices.uc?.forEach((_, i) => { 
        const input = document.getElementById(`pubg_uc_${i}`); 
        if (input) pubgPrices.uc[i].price = parseInt(input.value); 
      });
      pubgPrices.code?.forEach((_, i) => { 
        const input = document.getElementById(`pubg_code_${i}`); 
        if (input) pubgPrices.code[i].price = parseInt(input.value); 
      });
      db.ref('prices/pubg').set(pubgPrices).then(() => {
        alert('✅ PUBG ဈေးနှုန်းများ သိမ်းပြီးပါပြီ။');
        document.getElementById('priceModal').classList.remove('show');
      }).catch(err => alert('သိမ်းဆည်းမှု မအောင်မြင်ပါ။ ထပ်မံကြိုးစားပါ။'));
    }
  }

  // Load Messages
  function loadMessages() {
    db.ref('chats').on('value', (snapshot) => {
      allMessages = [];
      snapshot.forEach(userChats => { const userId = userChats.key; userChats.forEach(msg => { const message = msg.val(); message.userId = userId; message.id = msg.key; allMessages.push(message); }); });
      renderMessages();
    });
  }

  function renderMessages() {
    const container = document.getElementById('messagesList');
    if (!container) return;
    const userMessages = allMessages.filter(m => m.sender === 'user').reverse();
    if (userMessages.length === 0) { container.innerHTML = '<div class="empty-state">စာတိုမရှိသေးပါ</div>'; return; }
    container.innerHTML = '';
    userMessages.forEach(msg => {
      const div = document.createElement('div'); div.className = 'message-card';
      div.innerHTML = `<div><span class="user-name"><i class="fas fa-user"></i> ${escapeHtml(msg.userName || 'အသုံးပြုသူ')}</span> <small>${formatDate(msg.timestamp)}</small></div><div class="message-text">${escapeHtml(msg.text)}</div><div class="reply-area"><input type="text" id="reply_${msg.id}" placeholder="ပြန်ကြားရန် စာသားရိုက်ထည့်ပါ..."><button class="reply-btn" data-id="${msg.id}" data-userid="${msg.userId}">ပြန်ကြားမည်</button></div>`;
      container.appendChild(div);
    });
    document.querySelectorAll('.reply-btn').forEach(btn => btn.addEventListener('click', () => { const input = document.getElementById(`reply_${btn.dataset.id}`); const text = input.value.trim(); if (text) { db.ref('chats/' + btn.dataset.userId).push({ text: text, sender: 'admin', timestamp: Date.now(), userName: 'Admin' }); input.value = ''; } }));
  }

  function updateStats() {
    document.getElementById('totalUsers').innerText = allUsers.length;
    document.getElementById('totalGames').innerText = allGames.length;
    const pendingOrders = allOrders.filter(o => o.status === 'Pending').length;
    document.getElementById('pendingOrders').innerText = pendingOrders;
    document.getElementById('orderBadge').innerText = pendingOrders;
    const pendingTopups = allTopups.filter(t => t.status === 'Pending').length;
    document.getElementById('pendingTopups').innerText = pendingTopups;
    document.getElementById('topupBadge').innerText = pendingTopups;
  }

  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.getElementById(`${tabId}Tab`).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(btn => { btn.classList.remove('active'); if (btn.dataset.tab === tabId) btn.classList.add('active'); });
  }

  function closeBalanceModal() { document.getElementById('balanceModal').classList.remove('show'); currentUserId = null; currentBalanceMode = null; }
  function closeMessageModal() { document.getElementById('messageUserModal').classList.remove('show'); currentMessageUserId = null; }

  // Event Listeners
  document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
  document.querySelectorAll('.stat-card').forEach(card => card.addEventListener('click', () => switchTab(card.dataset.tab)));
  document.getElementById('logoutBtn').addEventListener('click', () => { sessionStorage.removeItem('adminLoggedIn'); window.location.href = 'admin-login.html'; });
  document.getElementById('closeBalanceModal').addEventListener('click', closeBalanceModal);
  document.getElementById('confirmBalanceBtn').addEventListener('click', processBalance);
  document.getElementById('closePriceModal').addEventListener('click', () => document.getElementById('priceModal').classList.remove('show'));
  document.getElementById('savePriceBtn').addEventListener('click', saveAllPrices);
  document.getElementById('closeMessageModal').addEventListener('click', closeMessageModal);
  document.getElementById('sendMessageBtn').addEventListener('click', sendMessageToUser);
  window.addEventListener('click', (e) => { 
    if (e.target === document.getElementById('balanceModal')) closeBalanceModal(); 
    if (e.target === document.getElementById('priceModal')) document.getElementById('priceModal').classList.remove('show'); 
    if (e.target === document.getElementById('messageUserModal')) closeMessageModal(); 
  });

  loadOrders(); loadTopups(); loadUsers(); loadGames(); loadMessages(); loadPrices();
</script>
</body>
</html>
