<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #0f172a 0%, #1e1b2e 100%); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 1rem; 
    }
    .login-container { max-width: 400px; width: 100%; }
    .login-card { 
      background: #1e293b; 
      border-radius: 2rem; 
      padding: 2rem; 
      border: 1px solid #334155; 
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5); 
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo i { font-size: 3rem; color: #3b82f6; margin-bottom: 0.5rem; }
    .logo h1 { color: #3b82f6; font-size: 1.8rem; }
    .logo p { color: #94a3b8; font-size: 0.8rem; }
    .input-group { margin-bottom: 1.2rem; }
    label { display: block; color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.4rem; }
    input { 
      width: 100%; 
      padding: 0.8rem 1rem; 
      border: 1px solid #334155; 
      border-radius: 0.8rem; 
      background: #0f172a; 
      color: white; 
      font-size: 1rem; 
      transition: 0.2s;
    }
    input:focus { outline: none; border-color: #3b82f6; }
    .login-btn { 
      width: 100%; 
      background: #3b82f6; 
      color: white; 
      padding: 0.8rem; 
      border: none; 
      border-radius: 0.8rem; 
      font-size: 1rem; 
      font-weight: 600; 
      cursor: pointer; 
      margin-top: 1rem; 
      transition: 0.2s; 
    }
    .login-btn:hover { background: #2563eb; }
    .error-msg { 
      background: #7f1d1d; 
      color: #fecaca; 
      padding: 0.8rem; 
      border-radius: 0.8rem; 
      margin-top: 1rem; 
      text-align: center; 
      display: none; 
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <i class="fas fa-user-shield"></i>
      <h1>Admin Login</h1>
      <p>Dia Zone Management Panel</p>
    </div>
    <form id="adminLoginForm">
      <div class="input-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" id="adminUsername" placeholder="Enter admin username" autocomplete="off">
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="adminPassword" placeholder="Enter admin password">
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <div id="loginError" class="error-msg">
      <i class="fas fa-exclamation-triangle"></i> Invalid username or password
    </div>
  </div>
</div>

<script>
  // Admin credentials
  const ADMIN_USERNAME = 'Joker';
  const ADMIN_PASSWORD = 'Good1993#';
  const SESSION_DURATION = 12 * 60 * 60 * 1000; // 12 hours

  document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const username = document.getElementById('adminUsername').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errorDiv = document.getElementById('loginError');
    
    console.log('Login attempt - Username:', username);
    
    if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      console.log('Login success! Redirecting to admin.html');
      const loginData = {
        loggedIn: true,
        loginTime: new Date().toISOString(),
        expiryTime: new Date(Date.now() + SESSION_DURATION).toISOString()
      };
      sessionStorage.setItem('adminLoggedIn', JSON.stringify(loginData));
      window.location.href = 'admin.html';
    } else {
      console.log('Login failed: Invalid credentials');
      errorDiv.classList.add('show');
      setTimeout(() => { 
        errorDiv.classList.remove('show'); 
      }, 3000);
    }
  });
</script>
</body>
</html>
