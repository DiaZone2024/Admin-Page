<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin Login - Dia Zone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body { 
      font-family: 'Inter', 'Poppins', sans-serif; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 1rem;
      background-image: url('image/layla.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    
    .login-container { 
      max-width: 420px; 
      width: 100%; 
    }
    
    .login-card { 
      background: rgba(18, 22, 48, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 2rem; 
      padding: 2rem; 
      border: 1px solid rgba(255, 215, 0, 0.25);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
    }
    
    .logo { 
      text-align: center; 
      margin-bottom: 2rem; 
    }
    
    .logo i { 
      font-size: 3rem; 
      background: linear-gradient(145deg, #FFC857, #FFAE2B);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem; 
    }
    
    .logo h1 { 
      background: linear-gradient(120deg, #FFF8E7, #FFE6A3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 1.8rem; 
      font-weight: 800;
    }
    
    .logo p { 
      color: #9ba3e0; 
      font-size: 0.8rem; 
    }
    
    .input-group { 
      margin-bottom: 1.2rem; 
    }
    
    label { 
      display: block; 
      color: #b9c3ff; 
      font-size: 0.85rem; 
      margin-bottom: 0.4rem; 
      font-weight: 500;
    }
    
    label i {
      margin-right: 5px;
      color: #FFC857;
    }
    
    input { 
      width: 100%; 
      padding: 0.85rem 1rem; 
      border: 1.5px solid rgba(255, 215, 0, 0.3);
      border-radius: 1rem; 
      background: rgba(10, 12, 28, 0.7);
      color: white; 
      font-size: 1rem; 
      transition: 0.2s;
    }
    
    input:focus { 
      outline: none; 
      border-color: #FFC857;
      box-shadow: 0 0 0 3px rgba(255, 200, 87, 0.2);
    }
    
    input::placeholder {
      color: #6c72a5;
    }
    
    .login-btn { 
      width: 100%; 
      background: linear-gradient(95deg, #FFC857, #FFAE2B);
      color: #12142e;
      padding: 0.85rem; 
      border: none; 
      border-radius: 2rem; 
      font-size: 1rem; 
      font-weight: 800; 
      cursor: pointer; 
      margin-top: 1rem; 
      transition: 0.2s; 
    }
    
    .login-btn:hover { 
      transform: scale(0.98);
      background: linear-gradient(95deg, #FFD46E, #FFB83B);
    }
    
    .error-msg { 
      background: rgba(255, 70, 70, 0.15);
      border: 1px solid rgba(255, 110, 110, 0.4);
      color: #ffaeae;
      padding: 0.8rem; 
      border-radius: 1rem; 
      margin-top: 1rem; 
      text-align: center; 
      display: none; 
      font-size: 0.85rem;
    }
    
    .error-msg.show { 
      display: block; 
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <i class="fas fa-user-shield"></i>
      <h1>အက်ဒမင် ဝင်ရောက်ရန်</h1>
      <p>Dia Zone စီမံခန့်ခွဲရေးအကန့်</p>
    </div>
    <form id="adminLoginForm">
      <div class="input-group">
        <label><i class="fas fa-user"></i> အသုံးပြုသူအမည်</label>
        <input type="text" id="adminUsername" placeholder="အက်ဒမင် အသုံးပြုသူအမည် ထည့်ပါ" autocomplete="off">
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> စကားဝှက်</label>
        <input type="password" id="adminPassword" placeholder="စကားဝှက် ထည့်ပါ">
      </div>
      <button type="submit" class="login-btn">ဝင်ရောက်မည်</button>
    </form>
    <div id="loginError" class="error-msg">
      <i class="fas fa-exclamation-triangle"></i> အသုံးပြုသူအမည် သို့မဟုတ် စကားဝှက် မှားယွင်းနေပါသည်
    </div>
  </div>
</div>

<script>
  // Admin credentials
  const ADMIN_USERNAME = 'Joker';
  const ADMIN_PASSWORD = 'Good1993#';
  const SESSION_DURATION = 12 * 60 * 60 * 1000; // 12 hours

  document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const username = document.getElementById('adminUsername').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errorDiv = document.getElementById('loginError');
    
    if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      const loginData = {
        loggedIn: true,
        loginTime: new Date().toISOString(),
        expiryTime: new Date(Date.now() + SESSION_DURATION).toISOString()
      };
      sessionStorage.setItem('adminLoggedIn', JSON.stringify(loginData));
      window.location.href = 'admin.html';
    } else {
      errorDiv.classList.add('show');
      setTimeout(() => { 
        errorDiv.classList.remove('show'); 
      }, 3000);
    }
  });
</script>
</body>
</html>
